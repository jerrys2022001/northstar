name: Update AI News

on:
  workflow_dispatch:
    inputs:
      digest_date:
        description: "Optional digest date to refresh (YYYY-MM-DD). Defaults to today in Asia/Shanghai."
        required: false
        type: string
      max_backfill_days:
        description: "Maximum recent digest days to catch up when digest_date is not set."
        required: false
        default: "3"
        type: string
  schedule:
    # 08:45 Asia/Shanghai (00:45 UTC). Primary daily refresh.
    - cron: "45 0 * * *"
    # Fallback refreshes. GitHub scheduled workflows can be delayed or skipped,
    # and early source windows are sometimes sparse; reruns are cheap because the
    # backfill script exits when today's feed already has enough stories.
    - cron: "15 3 * * *"
    - cron: "45 8 * * *"
    - cron: "30 13 * * *"

permissions:
  contents: write

concurrency:
  group: update-ai-news
  cancel-in-progress: false

jobs:
  update-ai-news:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      NEWS_BRANCH: ${{ github.event.repository.default_branch }}
      NEWS_TIME_ZONE: Asia/Shanghai
      NEWS_MAX_BACKFILL_DAYS: ${{ github.event.inputs.max_backfill_days || '3' }}
    steps:
      - name: Check out site branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Sync latest site branch
        shell: bash
        run: |
          git fetch origin "$NEWS_BRANCH"
          git checkout -B "$NEWS_BRANCH" "origin/$NEWS_BRANCH"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve digest date
        id: digest-date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.digest_date }}" ]; then
            echo "date=${{ github.event.inputs.digest_date }}" >> "$GITHUB_OUTPUT"
            echo "mode=manual-date" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(TZ="$NEWS_TIME_ZONE" date +%F)" >> "$GITHUB_OUTPUT"
            echo "mode=catch-up" >> "$GITHUB_OUTPUT"
          fi

      - name: Catch up and merge missing NEWS digests
        shell: bash
        run: |
          MAX_ATTEMPTS=10
          ATTEMPT=1
          SLEEP_SECONDS=1800
          DATE_ARGS=(--end-date "${{ steps.digest-date.outputs.date }}")

          if [ "${{ steps.digest-date.outputs.mode }}" = "manual-date" ]; then
            DATE_ARGS+=(--start-date "${{ steps.digest-date.outputs.date }}")
          else
            DATE_ARGS+=(--max-backfill-days "$NEWS_MAX_BACKFILL_DAYS")
          fi

          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            echo "NEWS catch-up attempt $ATTEMPT/$MAX_ATTEMPTS"

            if python scripts/run_news_backfill.py \
              --time-zone "$NEWS_TIME_ZONE" \
              "${DATE_ARGS[@]}" \
              --limit 96 \
              --fetch-min-items 80 \
              --max-fetch-min-items 80 \
              --max-fetch-limit 96 \
              --initial-catalog-expansion-feeds 48 \
              --max-catalog-expansion-feeds 48 \
              --skip-render-validation; then
              echo "NEWS catch-up succeeded on attempt $ATTEMPT"
              break
            fi

            if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              echo "NEWS catch-up failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi

            echo "Retrying NEWS catch-up in ${SLEEP_SECONDS}s..."
            sleep "$SLEEP_SECONDS"
            ATTEMPT=$((ATTEMPT + 1))
          done

      - name: Commit updated news
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- app.js data/news
          git add -f -- output/news-logs/*.md
          if git diff --cached --quiet; then
            echo "No AI news changes to commit."
          else
            git commit -m "Update AI news feed"
            git pull --rebase --autostash origin "$NEWS_BRANCH"
            git push origin HEAD:"$NEWS_BRANCH"
          fi
