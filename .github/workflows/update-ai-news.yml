name: Update AI News

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"
    - cron: "17 1 * * *"
    - cron: "17 2 * * *"

permissions:
  contents: write

concurrency:
  group: update-ai-news
  cancel-in-progress: false

jobs:
  update-ai-news:
    runs-on: ubuntu-latest
    env:
      NEWS_BRANCH: ${{ github.event.repository.default_branch }}
      NEWS_TIME_ZONE: Asia/Shanghai
    steps:
      - name: Check out site branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Catch up and merge missing NEWS digests
        shell: bash
        run: |
          MAX_ATTEMPTS=3
          ATTEMPT=1

          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            echo "NEWS catch-up attempt $ATTEMPT/$MAX_ATTEMPTS"

            if python scripts/run_news_backfill.py --time-zone "$NEWS_TIME_ZONE" --limit 36 --skip-render-validation; then
              echo "NEWS catch-up succeeded on attempt $ATTEMPT"
              break
            fi

            if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              echo "NEWS catch-up failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi

            SLEEP_SECONDS=$((ATTEMPT * 60))
            echo "Retrying NEWS catch-up in ${SLEEP_SECONDS}s..."
            sleep "$SLEEP_SECONDS"
            ATTEMPT=$((ATTEMPT + 1))
          done

      - name: Commit updated news
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js data/news output/news-logs
          if git diff --cached --quiet; then
            echo "No AI news changes to commit."
          else
            git commit -m "Update AI news feed"
            git push origin HEAD:"$NEWS_BRANCH"
          fi
