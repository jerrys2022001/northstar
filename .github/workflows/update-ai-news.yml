name: Update AI News

on:
  workflow_dispatch:
  schedule:
    # 16:30 and 19:30 Asia/Shanghai. Run after the daily source feeds have
    # had time to settle, with one later retry window for transient misses.
    - cron: "30 8,11 * * *"

permissions:
  contents: write

concurrency:
  group: update-ai-news
  cancel-in-progress: false

jobs:
  update-ai-news:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      NEWS_BRANCH: ${{ github.event.repository.default_branch }}
      NEWS_TIME_ZONE: Asia/Shanghai
    steps:
      - name: Check out site branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Sync latest site branch
        shell: bash
        run: |
          git fetch origin "$NEWS_BRANCH"
          git checkout -B "$NEWS_BRANCH" "origin/$NEWS_BRANCH"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Catch up and merge missing NEWS digests
        shell: bash
        run: |
          MAX_ATTEMPTS=10
          ATTEMPT=1
          SLEEP_SECONDS=1800

          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            echo "NEWS catch-up attempt $ATTEMPT/$MAX_ATTEMPTS"

            if python scripts/run_news_backfill.py \
              --time-zone "$NEWS_TIME_ZONE" \
              --limit 96 \
              --fetch-min-items 80 \
              --max-fetch-min-items 80 \
              --max-fetch-limit 96 \
              --initial-catalog-expansion-feeds 48 \
              --max-catalog-expansion-feeds 48 \
              --skip-render-validation; then
              echo "NEWS catch-up succeeded on attempt $ATTEMPT"
              break
            fi

            if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              echo "NEWS catch-up failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi

            echo "Retrying NEWS catch-up in ${SLEEP_SECONDS}s..."
            sleep "$SLEEP_SECONDS"
            ATTEMPT=$((ATTEMPT + 1))
          done

      - name: Commit updated news
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- app.js data/news output/news-logs
          if [ -z "$(git status --porcelain)" ]; then
            echo "No AI news changes to commit."
          else
            git commit -m "Update AI news feed"
            git pull --rebase --autostash origin "$NEWS_BRANCH"
            git push origin HEAD:"$NEWS_BRANCH"
          fi
