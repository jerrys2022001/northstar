name: Update AI News

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"

permissions:
  contents: write

jobs:
  update-ai-news:
    runs-on: ubuntu-latest
    steps:
      - name: Check out news branch
        uses: actions/checkout@v4
        with:
          ref: codex/news-updates

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch AI radar candidates
        run: python scripts/fetch_ai_news_radar.py --date "$(date -u +%F)" --limit 12

      - name: Merge candidates into Northstar NEWS
        run: python scripts/run_daily_news_task.py --date "$(date -u +%F)" --skip-render-validation

      - name: Commit updated news
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js data/news/*.json
          if git diff --cached --quiet; then
            echo "No AI news changes to commit."
          else
            git commit -m "Update AI news feed"
            git push origin HEAD:codex/news-updates
          fi
